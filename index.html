<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC High-Contrast Simulation Sandbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            color: #e4e6eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 340px;
            background: #0d1117;
            border-right: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
        }
        .sidebar-hidden #sidebar {
            display: none;
        }
        h2 {
            font-size: 14px;
            letter-spacing: 1.5px;
            color: #58a6ff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .instruction {
            font-size: 11px;
            color: #8b949e;
            line-height: 1.4;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: #c9d1d9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, slider {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            color: #f0f6fc;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        select:focus {
            border-color: #58a6ff;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #58a6ff;
            margin-top: 5px;
        }
        #canvas-container {
            flex: 1;
            position: relative;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background: #4e545c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h2>Matrix Controls</h2>
            <p class="instruction">Double-tap the field to clear all UI overlays for pristine data capture.</p>
        </div>

        <div class="control-group">
            <label>Camera Perspective Profile</label>
            <select id="cameraPreset">
                <option value="coop">Co-Op View (Elevated Structure)</option>
                <option value="tele">Tele Broadcast (Standard View)</option>
                <option value="tactical">Tactical Ortho (Flat Radar)</option>
            </select>
            <div style="margin-top: 8px;">
                <div class="slider-container">
                    <label>Dynamic Pitch Angle</label>
                    <span id="angleVal" style="font-size: 11px; color:#58a6ff;">45°</span>
                </div>
                <input type="range" id="pitchAngle" min="20" max="90" value="45">
            </div>
        </div>

        <div class="control-group">
            <label>Team A Core Mask</label>
            <select id="colorTeamA">
                <option value="#00ffff" selected>Neon Cyan</option>
                <option value="#ff00ff">Neon Magenta</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#ffffff">Pure White</option>
                <option value="#ff003c">High-Vis Red</option>
                <option value="#002244">Navy Blue</option>
                <option value="#000000">Absolute Black</option>
            </select>
        </div>

        <div class="control-group">
            <label>Team B Core Mask</label>
            <select id="colorTeamB">
                <option value="#ff00ff" selected>Neon Magenta</option>
                <option value="#00ffff">Neon Cyan</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#ffffff">Pure White</option>
                <option value="#ff003c">High-Vis Red</option>
                <option value="#002244">Navy Blue</option>
                <option value="#000000">Absolute Black</option>
            </select>
        </div>

        <div class="control-group">
            <label>Match Official Mask</label>
            <select id="colorRef">
                <option value="#ffff00" selected>Neon Yellow</option>
                <option value="#00ffff">Neon Cyan</option>
                <option value="#ff00ff">Neon Magenta</option>
                <option value="#ffffff">Pure White</option>
                <option value="#ff003c">High-Vis Red</option>
                <option value="#002244">Navy Blue</option>
                <option value="#000000">Absolute Black</option>
            </select>
        </div>

        <div class="control-group">
            <label>Ball Tracking Asset</label>
            <select id="colorBall">
                <option value="#ffffff" selected>Pure White</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#00ffff">Neon Cyan</option>
                <option value="#ff00ff">Neon Magenta</option>
                <option value="#ff003c">High-Vis Red</option>
                <option value="#000000">Absolute Black</option>
            </select>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="pitchCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pitchCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // UI Target Hooks
        const cameraPreset = document.getElementById('cameraPreset');
        const pitchAngleSlider = document.getElementById('pitchAngle');
        const angleValDisplay = document.getElementById('angleVal');
        const colorTeamA = document.getElementById('colorTeamA');
        const colorTeamB = document.getElementById('colorTeamB');
        const colorRef = document.getElementById('colorRef');
        const colorBall = document.getElementById('colorBall');

        // Field Dimensions Matrix (Standard 105m x 68m scaled context)
        const pitchWidth = 1050;
        const pitchHeight = 680;

        // Mock Simulation State Engine Vectors
        let entities = [];
        function initSimulationEntities() {
            entities = [];
            // Team A Layout
            for(let i=0; i<11; i++) {
                entities.push({ type: 'A', x: 150 + Math.random()*350, y: 50 + Math.random()*580, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 });
            }
            // Team B Layout
            for(let i=0; i<11; i++) {
                entities.push({ type: 'B', x: 550 + Math.random()*350, y: 50 + Math.random()*580, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 });
            }
            // Referee
            entities.push({ type: 'Ref', x: 525, y: 340, vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5 });
            // Ball
            entities.push({ type: 'Ball', x: 525, y: 340, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5 });
        }

        // Perspective Projection Transformation Function
        function projectCoordinate(x, y) {
            let angleRad = (pitchAngleSlider.value * Math.PI) / 180;
            
            // Normalize origin to center of pitch canvas layout
            let cx = x - pitchWidth / 2;
            let cy = y - pitchHeight / 2;

            // Apply rotation compression based on camera angle vector
            let projectedY = cy * Math.sin(angleRad);
            
            // Apply scale distance compression factor (Z-depth simulation effect)
            let zDepth = 1 + (cy * Math.cos(angleRad)) / 1200; 
            let projectedX = cx / zDepth;

            // Shift coordinate mappings back to viewport center
            return {
                x: canvas.width / 2 + projectedX * (canvas.width / (pitchWidth * 1.3)),
                y: canvas.height / 2 + projectedY * (canvas.height / (pitchHeight * 1.1))
            };
        }

        function resizeCanvasViewport() {
            const aspect = pitchWidth / pitchHeight;
            let w = container.clientWidth - 40;
            let h = w / aspect;

            if (h > container.clientHeight - 40) {
                h = container.clientHeight - 40;
                w = h * aspect;
            }

            canvas.width = w;
            canvas.height = h;
        }

        // Render Pitch Background Pattern (High Contrast Desaturated Gray Bands)
        function drawHighContrastPitch() {
            const bands = 15;
            const bandWidth = pitchWidth / bands;

            for (let i = 0; i < bands; i++) {
                ctx.fillStyle = (i % 2 === 0) ? '#535a61' : '#4a5057';
                
                // Draw path points transformed through perspective lens
                ctx.beginPath();
                let pTl = projectCoordinate(i * bandWidth, 0);
                let pTr = projectCoordinate((i + 1) * bandWidth, 0);
                let pBr = projectCoordinate((i + 1) * bandWidth, pitchHeight);
                let pBl = projectCoordinate(i * bandWidth, pitchHeight);

                ctx.moveTo(pTl.x, pTl.y);
                ctx.lineTo(pTr.x, pTr.y);
                ctx.lineTo(pBr.x, pBr.y);
                ctx.lineTo(pBl.x, pBl.y);
                ctx.closePath();
                ctx.fill();
            }

            // Draw Clean White Line Markings
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.lineWidth = 2;

            // Main Outer Boundary Ring Path
            ctx.beginPath();
            let tl = projectCoordinate(0, 0);
            let tr = projectCoordinate(pitchWidth, 0);
            let br = projectCoordinate(pitchWidth, pitchHeight);
            let bl = projectCoordinate(0, pitchHeight);
            ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
            ctx.closePath();
            ctx.stroke();

            // Center Line Segment
            ctx.beginPath();
            let midTop = projectCoordinate(pitchWidth / 2, 0);
            let midBot = projectCoordinate(pitchWidth / 2, pitchHeight);
            ctx.moveTo(midTop.x, midTop.y);
            ctx.lineTo(midBot.x, midBot.y);
            ctx.stroke();

            // Center Circle Array tracking
            ctx.beginPath();
            let centerPoint = projectCoordinate(pitchWidth / 2, pitchHeight / 2);
            let radius = 91.5; // Scaled match regulations
            for (let a = 0; a <= 360; a += 5) {
                let rad = (a * Math.PI) / 180;
                let pt = projectCoordinate(pitchWidth / 2 + radius * Math.cos(rad), pitchHeight / 2 + radius * Math.sin(rad));
                if (a === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
        }

        // Master Frame Render Execution Loop
        function renderExecutionPipeline() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Field Setup
            drawHighContrastPitch();

            // 2. Update and Draw Flat-Shaded Entities
            entities.forEach(ent => {
                // Bounds Collision Check and Vector Step
                if(ent.type !== 'Ball') {
                    ent.x += ent.vx; ent.y += ent.vy;
                    if(ent.x < 0 || ent.x > pitchWidth) ent.vx *= -1;
                    if(ent.y < 0 || ent.y > pitchHeight) ent.vy *= -1;
                } else {
                    ent.x += ent.vx; ent.y += ent.vy;
                    if(ent.x < 0 || ent.x > pitchWidth) ent.vx *= -1;
                    if(ent.y < 0 || ent.y > pitchHeight) ent.vy *= -1;
                    // Friction vector damping
                    ent.vx *= 0.99; ent.vy *= 0.99;
                    if(Math.abs(ent.vx) < 0.1) { ent.vx = (Math.random()-0.5)*6; ent.vy = (Math.random()-0.5)*6; }
                }

                // Transform position coordinates
                let pos = projectCoordinate(ent.x, ent.y);

                // Define flat asset fill configurations based on UI dropdown selections
                if (ent.type === 'A') {
                    ctx.fillStyle = colorTeamA.value;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2); ctx.fill();
                } else if (ent.type === 'B') {
                    ctx.fillStyle = colorTeamB.value;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2); ctx.fill();
                } else if (ent.type === 'Ref') {
                    ctx.fillStyle = colorRef.value;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2); ctx.fill();
                } else if (ent.type === 'Ball') {
                    ctx.fillStyle = colorBall.value;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2); ctx.fill();
                }
            });

            requestAnimationFrame(renderExecutionPipeline);
        }

        // Camera Preset Profile Engine Listener
        cameraPreset.addEventListener('change', (e) => {
            if (e.target.value === 'coop') {
                pitchAngleSlider.value = 52;
            } else if (e.target.value === 'tele') {
                pitchAngleSlider.value = 34;
            } else if (e.target.value === 'tactical') {
                pitchAngleSlider.value = 90;
            }
            angleValDisplay.textContent = pitchAngleSlider.value + "°";
        });

        pitchAngleSlider.addEventListener('input', (e) => {
            angleValDisplay.textContent = e.target.value + "°";
            cameraPreset.value = "custom";
        });

        // Toggle Clean Screen Isolation Framework via Double-Tap
        window.addEventListener('dblclick', () => {
            document.body.classList.toggle('sidebar-hidden');
            setTimeout(resizeCanvasViewport, 50);
        });

        window.addEventListener('resize', resizeCanvasViewport);

        // Bootstrap Sandbox Pipeline
        resizeCanvasViewport();
        initSimulationEntities();
        renderExecutionPipeline();
    </script>
</body>
</html>
