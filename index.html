<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Tactical Simulation - CV Dataset Sandbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            color: #e4e6eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 340px;
            background: #0d1117;
            border-right: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
        }
        .sidebar-hidden #sidebar {
            display: none;
        }
        h2 {
            font-size: 14px;
            letter-spacing: 1.5px;
            color: #58a6ff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .instruction {
            font-size: 11px;
            color: #8b949e;
            line-height: 1.4;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: #c9d1d9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            color: #f0f6fc;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        .phase-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-transition { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
        .badge-attackA { background: rgba(0, 255, 255, 0.15); color: #00ffff; border: 1px solid #00ffff; }
        .badge-attackB { background: rgba(255, 0, 255, 0.15); color: #ff00ff; border: 1px solid #ff00ff; }
        .badge-goal { background: #238636; color: #ffffff; border: 1px solid #2ea043; }
        
        #pauseBtn {
            width: 100%;
            background: #238636;
            border: 1px solid #2ea043;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        #pauseBtn.paused {
            background: #da3637;
            border: 1px solid #f85149;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 12px;
            background: #21262d;
            border-radius: 4px;
            border: 1px solid #30363d;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background: #4e545c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h2>Matrix Controls</h2>
            <p class="instruction">Double-tap the field to clear all UI overlays. Use <b>SPACEBAR</b> to quickly freeze scenarios.</p>
        </div>

        <!-- Engine State Freeze System -->
        <div class="control-group">
            <label>Simulation Clock</label>
            <button id="pauseBtn">Pause Simulation</button>
        </div>

        <!-- Live Score Tracker -->
        <div class="control-group">
            <label>Match Score</label>
            <div id="scoreboard">
                <span style="color: #00ffff;" id="scoreA_disp">TEAM A: 0</span>
                <span style="color: #ff00ff;" id="scoreB_disp">TEAM B: 0</span>
            </div>
        </div>

        <!-- Live Engine Diagnostics -->
        <div class="control-group">
            <label>Live Tactical State</label>
            <div id="phaseIndicator" class="phase-badge badge-transition">Transition Phase</div>
        </div>

        <!-- Camera Profile Controllers -->
        <div class="control-group">
            <label>Camera Perspective Profile</label>
            <select id="cameraPreset">
                <option value="coop" selected>Co-Op View (Elevated Structure)</option>
                <option value="tele">Tele Broadcast (Standard View)</option>
                <option value="tactical">Tactical Ortho (Flat Radar)</option>
            </select>
            <div style="margin-top: 6px; display: none;">
                <input type="range" id="pitchAngle" min="20" max="90" value="52">
            </div>
        </div>

        <!-- Team Formations System -->
        <div class="control-group">
            <label>Team A Tactical Bloc</label>
            <select id="formationA">
                <option value="442">4 - 4 - 2 Traditional</option>
                <option value="433" selected>4 - 3 - 3 Attacking Width</option>
                <option value="451">4 - 5 - 1 Low Block</option>
                <option value="4141">4 - 1 - 4 - 1 Rigid Pivot</option>
            </select>
        </div>

        <div class="control-group">
            <label>Team B Tactical Bloc</label>
            <select id="formationB">
                <option value="442" selected>4 - 4 - 2 Traditional</option>
                <option value="433">4 - 3 - 3 Attacking Width</option>
                <option value="451">4 - 5 - 1 Low Block</option>
                <option value="4141">4 - 1 - 4 - 1 Rigid Pivot</option>
            </select>
        </div>

        <!-- Asset Color Selection System -->
        <div class="control-group">
            <label>Team A Mask</label>
            <select id="colorTeamA">
                <option value="#00ffff" selected>Neon Cyan</option>
                <option value="#ff00ff">Neon Magenta</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#ffffff">Pure White</option>
            </select>
        </div>

        <div class="control-group">
            <label>Team B Mask</label>
            <select id="colorTeamB">
                <option value="#ff00ff" selected>Neon Magenta</option>
                <option value="#00ffff">Neon Cyan</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#ffffff">Pure White</option>
            </select>
        </div>

        <div class="control-group">
            <label>Match Official</label>
            <select id="colorRef">
                <option value="#ffff00" selected>Neon Yellow</option>
                <option value="#ffffff">Pure White</option>
                <option value="#000000">Absolute Black</option>
            </select>
        </div>

        <div class="control-group">
            <label>Ball Tracker</label>
            <select id="colorBall">
                <option value="#ffffff" selected>Pure White</option>
                <option value="#ffff00">Neon Yellow</option>
                <option value="#ff003c">High-Vis Red</option>
            </select>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="pitchCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pitchCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // UI Hooks
        const cameraPreset = document.getElementById('cameraPreset');
        const pitchAngleSlider = document.getElementById('pitchAngle');
        const formationASelect = document.getElementById('formationA');
        const formationBSelect = document.getElementById('formationB');
        const colorTeamA = document.getElementById('colorTeamA');
        const colorTeamB = document.getElementById('colorTeamB');
        const colorRef = document.getElementById('colorRef');
        const colorBall = document.getElementById('colorBall');
        const phaseIndicator = document.getElementById('phaseIndicator');
        const scoreADisp = document.getElementById('scoreA_disp');
        const scoreBDisp = document.getElementById('scoreB_disp');
        const pauseBtn = document.getElementById('pauseBtn');

        const pitchWidth = 1050;
        const pitchHeight = 680;

        let players = [];
        let referee = { x: 525, y: 340, vx: 0, vy: 0, targetX: 525, targetY: 340 };
        let ball = { x: 525, y: 340, vx: 0, vy: 0, owner: null, lastOwner: null, cooldown: 0 };
        
        // Control Matrix Properties
        let matchPhase = "TRANSITION"; 
        let transitionTimer = 0;
        let scoreA = 0;
        let scoreB = 0;
        let resetTimer = 0; 
        let isPaused = false;

        const formationTemplates = {
            "442": [
                {r: 'GK', x: 60, y: 340},
                {r: 'LB', x: 240, y: 120}, {r: 'LCB', x: 210, y: 250}, {r: 'RCB', x: 210, y: 430}, {r: 'RB', x: 240, y: 560},
                {r: 'LM', x: 440, y: 120}, {r: 'LCM', x: 410, y: 260}, {r: 'RCM', x: 410, y: 420}, {r: 'RM', x: 440, y: 560},
                {r: 'ST1', x: 530, y: 260}, {r: 'ST2', x: 530, y: 420}
            ],
            "433": [
                {r: 'GK', x: 60, y: 340},
                {r: 'LB', x: 240, y: 120}, {r: 'LCB', x: 210, y: 250}, {r: 'RCB', x: 210, y: 430}, {r: 'RB', x: 240, y: 560},
                {r: 'LCM', x: 390, y: 200}, {r: 'CM', x: 370, y: 340}, {r: 'RCM', x: 390, y: 480},
                {r: 'LW', x: 530, y: 140}, {r: 'ST', x: 540, y: 340}, {r: 'RW', x: 530, y: 540}
            ],
            "451": [
                {r: 'GK', x: 60, y: 340},
                {r: 'LB', x: 220, y: 110}, {r: 'LCB', x: 190, y: 250}, {r: 'RCB', x: 190, y: 430}, {r: 'RB', x: 220, y: 570},
                {r: 'LM', x: 400, y: 120}, {r: 'LCM', x: 370, y: 240}, {r: 'CM', x: 360, y: 340}, {r: 'RCM', x: 370, y: 460}, {r: 'RM', x: 400, y: 560},
                {r: 'ST', x: 500, y: 340}
            ],
            "4141": [
                {r: 'GK', x: 60, y: 340},
                {r: 'LB', x: 240, y: 110}, {r: 'LCB', x: 210, y: 250}, {r: 'RCB', x: 210, y: 430}, {r: 'RB', x: 240, y: 570},
                {r: 'DM', x: 320, y: 340},
                {r: 'LM', x: 440, y: 120}, {r: 'LCM', x: 410, y: 240}, {r: 'RCM', x: 410, y: 440}, {r: 'RM', x: 440, y: 560},
                {r: 'ST', x: 530, y: 340}
            ]
        };

        function toggleEnginePauseState() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = "Resume Simulation";
                pauseBtn.classList.add("paused");
            } else {
                pauseBtn.textContent = "Pause Simulation";
                pauseBtn.classList.remove("paused");
            }
        }

        function buildMatchSquads() {
            players = [];
            const formA = formationTemplates[formationASelect.value];
            const formB = formationTemplates[formationBSelect.value];

            formA.forEach((pos, index) => {
                players.push({
                    id: 'A' + index, team: 'A', role: pos.r,
                    x: pos.x, y: pos.y, vx: 0, vy: 0,
                    baseHomeX: pos.x, baseHomeY: pos.y, tackleCooldown: 0
                });
            });

            formB.forEach((pos, index) => {
                let mirroredX = pitchWidth - pos.x;
                players.push({
                    id: 'B' + index, team: 'B', role: pos.r,
                    x: mirroredX, y: pos.y, vx: 0, vy: 0,
                    baseHomeX: mirroredX, baseHomeY: pos.y, tackleCooldown: 0
                });
            });

            triggerKickoffReset();
        }

        function triggerKickoffReset() {
            players.forEach(p => {
                p.x = p.baseHomeX; p.y = p.baseHomeY;
                p.vx = 0; p.vy = 0; p.tackleCooldown = 0;
            });
            ball.x = 525; ball.y = 340; ball.vx = 0; ball.vy = 0;
            ball.owner = null; ball.lastOwner = null; ball.cooldown = 40;
            matchPhase = "TRANSITION";
            updatePhaseIndicatorUI();
        }

        function updateScoreboardUI() {
            scoreADisp.textContent = `TEAM A: ${scoreA}`;
            scoreBDisp.textContent = `TEAM B: ${scoreB}`;
        }

        function projectCoordinate(x, y) {
            let angleRad = (pitchAngleSlider.value * Math.PI) / 180;
            let cx = x - pitchWidth / 2;
            let cy = y - pitchHeight / 2;
            let projectedY = cy * Math.sin(angleRad);
            let zDepth = 1 - (cy * Math.cos(angleRad)) / 800; 
            let projectedX = cx / zDepth;

            return {
                x: canvas.width / 2 + projectedX * (canvas.width / (pitchWidth * 1.35)),
                y: canvas.height / 2 + projectedY * (canvas.height / (pitchHeight * 1.15))
            };
        }

        function resizeCanvasViewport() {
            const aspect = pitchWidth / pitchHeight;
            let w = container.clientWidth - 40;
            let h = w / aspect;
            if (h > container.clientHeight - 40) {
                h = container.clientHeight - 40;
                w = h * aspect;
            }
            canvas.width = w; canvas.height = h;
        }

        function updatePhaseIndicatorUI() {
            phaseIndicator.className = "phase-badge";
            if (resetTimer > 0) {
                phaseIndicator.textContent = "GOAL SCORED! RESETTING...";
                phaseIndicator.classList.add("badge-goal");
            } else if (matchPhase === "TRANSITION") {
                phaseIndicator.textContent = "Transition State";
                phaseIndicator.classList.add("badge-transition");
            } else if (matchPhase === "ATTACK_A") {
                phaseIndicator.textContent = "Team A Attacking";
                phaseIndicator.classList.add("badge-attackA");
            } else if (matchPhase === "ATTACK_B") {
                phaseIndicator.textContent = "Team B Attacking";
                phaseIndicator.classList.add("badge-attackB");
            }
        }

        function drawHighContrastPitch() {
            const bands = 15;
            const bandWidth = pitchWidth / bands;

            // Draw Turf Field Alternating Strips
            for (let i = 0; i < bands; i++) {
                ctx.fillStyle = (i % 2 === 0) ? '#383e42' : '#303538';
                ctx.beginPath();
                let pTl = projectCoordinate(i * bandWidth, 0);
                let pTr = projectCoordinate((i + 1) * bandWidth, 0);
                let pBr = projectCoordinate((i + 1) * bandWidth, pitchHeight);
                let pBl = projectCoordinate(i * bandWidth, pitchHeight);
                ctx.moveTo(pTl.x, pTl.y); ctx.lineTo(pTr.x, pTr.y); ctx.lineTo(pBr.x, pBr.y); ctx.lineTo(pBl.x, pBl.y);
                ctx.closePath(); ctx.fill();
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
            ctx.lineWidth = 2.5;

            // Boundary Lines
            ctx.beginPath();
            let tl = projectCoordinate(0, 0); let tr = projectCoordinate(pitchWidth, 0);
            let br = projectCoordinate(pitchWidth, pitchHeight); let bl = projectCoordinate(0, pitchHeight);
            ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
            ctx.closePath(); ctx.stroke();

            // Midfield Line
            ctx.beginPath();
            let midTop = projectCoordinate(pitchWidth / 2, 0); let midBot = projectCoordinate(pitchWidth / 2, pitchHeight);
            ctx.moveTo(midTop.x, midTop.y); ctx.lineTo(midBot.x, midBot.y); ctx.stroke();

            // Center Circle & Center Spot
            ctx.beginPath();
            let radius = 91.5;
            for (let a = 0; a <= 360; a += 6) {
                let rad = (a * Math.PI) / 180;
                let pt = projectCoordinate(pitchWidth / 2 + radius * Math.cos(rad), pitchHeight / 2 + radius * Math.sin(rad));
                if (a === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            let centerSpot = projectCoordinate(pitchWidth / 2, pitchHeight / 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
            ctx.beginPath(); ctx.arc(centerSpot.x, centerSpot.y, 4, 0, Math.PI * 2); ctx.fill();

            // Penalty Boxes (16.5m)
            ctx.beginPath();
            let boxL1 = projectCoordinate(0, 138); let boxL2 = projectCoordinate(165, 138);
            let boxL3 = projectCoordinate(165, 542); let boxL4 = projectCoordinate(0, 542);
            ctx.moveTo(boxL1.x, boxL1.y); ctx.lineTo(boxL2.x, boxL2.y); ctx.lineTo(boxL3.x, boxL3.y); ctx.lineTo(boxL4.x, boxL4.y);
            ctx.stroke();

            ctx.beginPath();
            let boxR1 = projectCoordinate(pitchWidth, 138); let boxR2 = projectCoordinate(pitchWidth - 165, 138);
            let boxR3 = projectCoordinate(pitchWidth - 165, 542); let boxR4 = projectCoordinate(pitchWidth, 542);
            ctx.moveTo(boxR1.x, boxR1.y); ctx.lineTo(boxR2.x, boxR2.y); ctx.lineTo(boxR3.x, boxR3.y); ctx.lineTo(boxR4.x, boxR4.y);
            ctx.stroke();

            // Goal Areas / 6-Yard Boxes
            ctx.beginPath();
            let gBoxL1 = projectCoordinate(0, 245); let gBoxL2 = projectCoordinate(55, 245);
            let gBoxL3 = projectCoordinate(55, 435); let gBoxL4 = projectCoordinate(0, 435);
            ctx.moveTo(gBoxL1.x, gBoxL1.y); ctx.lineTo(gBoxL2.x, gBoxL2.y); ctx.lineTo(gBoxL3.x, gBoxL3.y); ctx.lineTo(gBoxL4.x, gBoxL4.y);
            ctx.stroke();

            ctx.beginPath();
            let gBoxR1 = projectCoordinate(pitchWidth, 245); let gBoxR2 = projectCoordinate(pitchWidth - 55, 245);
            let gBoxR3 = projectCoordinate(pitchWidth - 55, 435); let gBoxR4 = projectCoordinate(pitchWidth, 435);
            ctx.moveTo(gBoxR1.x, gBoxR1.y); ctx.lineTo(gBoxR2.x, gBoxR2.y); ctx.lineTo(gBoxR3.x, gBoxR3.y); ctx.lineTo(gBoxR4.x, gBoxR4.y);
            ctx.stroke();

            // Penalty Spots
            let spotL = projectCoordinate(110, 340);
            ctx.beginPath(); ctx.arc(spotL.x, spotL.y, 3.5, 0, Math.PI * 2); ctx.fill();
            let spotR = projectCoordinate(pitchWidth - 110, 340);
            ctx.beginPath(); ctx.arc(spotR.x, spotR.y, 3.5, 0, Math.PI * 2); ctx.fill();

            // Penalty Arcs (The "D")
            ctx.beginPath();
            for (let a = -53; a <= 53; a += 5) {
                let rad = (a * Math.PI) / 180;
                let pt = projectCoordinate(110 + 91.5 * Math.cos(rad), 340 + 91.5 * Math.sin(rad));
                if (a === -53) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            ctx.beginPath();
            for (let a = 127; a <= 233; a += 5) {
                let rad = (a * Math.PI) / 180;
                let pt = projectCoordinate((pitchWidth - 110) + 91.5 * Math.cos(rad), 340 + 91.5 * Math.sin(rad));
                if (a === 127) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // Corner Arcs
            const cR = 15;
            ctx.beginPath(); // Top Left
            for(let a=0; a<=90; a+=15) { let r=(a*Math.PI)/180; let pt=projectCoordinate(cR*Math.cos(r), cR*Math.sin(r)); if(a===0) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); } ctx.stroke();
            ctx.beginPath(); // Bottom Left
            for(let a=270; a<=360; a+=15) { let r=(a*Math.PI)/180; let pt=projectCoordinate(cR*Math.cos(r), pitchHeight+cR*Math.sin(r)); if(a===270) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); } ctx.stroke();
            ctx.beginPath(); // Top Right
            for(let a=90; a<=180; a+=15) { let r=(a*Math.PI)/180; let pt=projectCoordinate(pitchWidth+cR*Math.cos(r), cR*Math.sin(r)); if(a===90) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); } ctx.stroke();
            ctx.beginPath(); // Bottom Right
            for(let a=180; a<=270; a+=15) { let r=(a*Math.PI)/180; let pt=projectCoordinate(pitchWidth+cR*Math.cos(r), pitchHeight+cR*Math.sin(r)); if(a===180) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); } ctx.stroke();

            // Physical Goal Frame Nets (Red Masks)
            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 4;
            ctx.beginPath();
            let lg1 = projectCoordinate(0, 290); let lg2 = projectCoordinate(-25, 290);
            let lg3 = projectCoordinate(-25, 390); let lg4 = projectCoordinate(0, 390);
            ctx.moveTo(lg1.x, lg1.y); ctx.lineTo(lg2.x, lg2.y); ctx.lineTo(lg3.x, lg3.y); ctx.lineTo(lg4.x, lg4.y);
            ctx.stroke();

            ctx.beginPath();
            let rg1 = projectCoordinate(pitchWidth, 290); let rg2 = projectCoordinate(pitchWidth + 25, 290);
            let rg3 = projectCoordinate(pitchWidth + 25, 390); let rg4 = projectCoordinate(pitchWidth, 390);
            ctx.moveTo(rg1.x, rg1.y); ctx.lineTo(rg2.x, rg2.y); ctx.lineTo(rg3.x, rg3.y); ctx.lineTo(rg4.x, rg4.y);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
        }

        function enginePhysicsStep() {
            if (resetTimer > 0) {
                resetTimer--;
                if (resetTimer === 0) { triggerKickoffReset(); updateScoreboardUI(); }
                return; 
            }

            if (ball.cooldown > 0) ball.cooldown--;
            if (transitionTimer > 0) {
                transitionTimer--;
                if (transitionTimer === 0 && !ball.owner) matchPhase = "TRANSITION";
            }

            // Tackle Calculations (40% Success Vector Matrix)
            if (ball.owner) {
                let carrier = ball.owner;
                players.forEach(p => {
                    if (p.tackleCooldown > 0) p.tackleCooldown--;

                    if (p.team !== carrier.team && p.role !== 'GK') {
                        let dist = Math.hypot(carrier.x - p.x, carrier.y - p.y);
                        if (dist < 18 && p.tackleCooldown === 0) {
                            p.tackleCooldown = 35;
                            if (Math.random() < 0.40) {
                                ball.owner = null; ball.lastOwner = carrier; ball.cooldown = 15;
                                let angle = Math.random() * Math.PI * 2;
                                ball.vx = Math.cos(angle) * 3.2; ball.vy = Math.sin(angle) * 3.2;
                                matchPhase = "TRANSITION"; transitionTimer = 40; updatePhaseIndicatorUI();
                            } else {
                                p.vx *= -0.4; p.vy *= -0.4; // Tackle failure stagger
                            }
                        }
                    }
                });
            } else {
                players.forEach(p => { if (p.tackleCooldown > 0) p.tackleCooldown--; });
            }

            // Entity Kinematics Steps
            players.forEach(p => {
                let phaseX = p.baseHomeX; let phaseY = p.baseHomeY;

                if (p.role !== 'GK') {
                    if (matchPhase === "ATTACK_A") {
                        if (p.team === 'A') { phaseX = p.baseHomeX + 115; phaseY = 340 + (p.baseHomeY - 340) * 1.35; }
                        else { phaseX = p.baseHomeX + 90; phaseY = 340 + (p.baseHomeY - 340) * 0.65; }
                    } else if (matchPhase === "ATTACK_B") {
                        if (p.team === 'B') { phaseX = p.baseHomeX - 115; phaseY = 340 + (p.baseHomeY - 340) * 1.35; }
                        else { phaseX = p.baseHomeX - 90; phaseY = 340 + (p.baseHomeY - 340) * 0.65; }
                    }
                }

                let ballBiasX = (ball.x - pitchWidth / 2) * 0.22;
                let ballBiasY = (ball.y - phaseY) * 0.14;

                let targetX, targetY;
                if (p.role === 'GK') { targetX = p.baseHomeX; targetY = p.baseHomeY + (ball.y - 340) * 0.18; }
                else { targetX = phaseX + ballBiasX; targetY = phaseY + ballBiasY; }

                if (!ball.owner && Math.hypot(ball.x - p.x, ball.y - p.y) < 190) { targetX = ball.x; targetY = ball.y; }

                let dx = targetX - p.x; let dy = targetY - p.y; let dist = Math.hypot(dx, dy);
                if (dist > 2) { p.vx += (dx / dist) * 0.075; p.vy += (dy / dist) * 0.075; }

                let baseCap = (matchPhase === "TRANSITION") ? 1.55 : 1.15;
                let maxSpeed = (!ball.owner && Math.hypot(ball.x - p.x, ball.y - p.y) < 190) ? 2.25 : baseCap;
                
                let currentSpeed = Math.hypot(p.vx, p.vy);
                if (currentSpeed > maxSpeed) { p.vx = (p.vx / currentSpeed) * maxSpeed; p.vy = (p.vy / currentSpeed) * maxSpeed; }

                p.x += p.vx; p.y += p.vy; p.vx *= 0.88; p.vy *= 0.88;
                p.x = Math.max(20, Math.min(pitchWidth - 20, p.x)); p.y = Math.max(20, Math.min(pitchHeight - 20, p.y));
            });

            // Ball Drag & Target Intent Vectors
            if (ball.owner) {
                ball.x = ball.owner.x; ball.y = ball.owner.y; ball.vx = 0; ball.vy = 0;

                if (Math.random() < 0.015) { 
                    let carrier = ball.owner; let executionShot = false;

                    if (carrier.team === 'A' && carrier.x > 780) {
                        ball.lastOwner = carrier; ball.owner = null; ball.cooldown = 30;
                        let gDx = pitchWidth - ball.x; let gDy = 340 - ball.y; let gDist = Math.hypot(gDx, gDy);
                        ball.vx = (gDx / gDist) * 6.8; ball.vy = (gDy / gDist) * 6.8; executionShot = true;
                    } else if (carrier.team === 'B' && carrier.x < 270) {
                        ball.lastOwner = carrier; ball.owner = null; ball.cooldown = 30;
                        let gDx = 0 - ball.x; let gDy = 340 - ball.y; let gDist = Math.hypot(gDx, gDy);
                        ball.vx = (gDx / gDist) * 6.8; ball.vy = (gDy / gDist) * 6.8; executionShot = true;
                    }

                    if (!executionShot) {
                        let teammates = players.filter(p => p.team === carrier.team && p.id !== carrier.id);
                        let recipient = teammates[Math.floor(Math.random() * teammates.length)];
                        ball.lastOwner = carrier; ball.owner = null; ball.cooldown = 25;
                        let dx = recipient.x - ball.x; let dy = recipient.y - ball.y; let dist = Math.hypot(dx, dy);
                        ball.vx = (dx / dist) * 5.3; ball.vy = (dy / dist) * 5.3;
                    }
                    matchPhase = "TRANSITION"; updatePhaseIndicatorUI();
                }
            } else {
                ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.965; ball.vy *= 0.965;

                // Goal Verification Boundary Scans
                if (ball.x <= 0) {
                    if (ball.y >= 290 && ball.y <= 390) { scoreB++; resetTimer = 80; ball.vx = 0; ball.vy = 0; updatePhaseIndicatorUI(); return; } 
                    else { ball.x = 0; ball.vx *= -1; }
                }
                if (ball.x >= pitchWidth) {
                    if (ball.y >= 290 && ball.y <= 390) { scoreA++; resetTimer = 80; ball.vx = 0; ball.vy = 0; updatePhaseIndicatorUI(); return; } 
                    else { ball.x = pitchWidth; ball.vx *= -1; }
                }
                if (ball.y < 0 || ball.y > pitchHeight) ball.vy *= -1;

                let idealGrabber = null; let closestDist = 12;
                players.forEach(p => {
                    if (ball.lastOwner && ball.lastOwner.id === p.id && ball.cooldown > 0) return;
                    let dist = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if (dist < closestDist) { closestDist = dist; idealGrabber = p; }
                });

                if (idealGrabber) {
                    let oldTeam = ball.lastOwner ? ball.lastOwner.team : null; ball.owner = idealGrabber;
                    if (oldTeam && oldTeam !== ball.owner.team) { matchPhase = "TRANSITION"; transitionTimer = 45; } 
                    else if (transitionTimer === 0) { matchPhase = (ball.owner.team === 'A') ? "ATTACK_A" : "ATTACK_B"; }
                    updatePhaseIndicatorUI();
                }

                if (Math.abs(ball.vx) + Math.abs(ball.vy) < 0.12) {
                    let randomPlayer = players[Math.floor(Math.random() * players.length)]; ball.owner = randomPlayer;
                    if (transitionTimer === 0) { matchPhase = (ball.owner.team === 'A') ? "ATTACK_A" : "ATTACK_B"; }
                    updatePhaseIndicatorUI();
                }
            }

            // Referee Tracking Trajectory
            referee.targetX = ball.x + (pitchWidth / 2 - ball.x) * 0.25; referee.targetY = ball.y + (ball.y > 340 ? -100 : 100);
            let rDx = referee.targetX - referee.x; let rDy = referee.targetY - referee.y;
            referee.vx += (rDx / Math.max(1, Math.hypot(rDx, rDy))) * 0.05; referee.vy += (rDy / Math.max(1, Math.hypot(rDx, rDy))) * 0.05;
            referee.x += referee.vx; referee.y += referee.vy; referee.vx *= 0.85; referee.vy *= 0.85;
        }

        function renderExecutionPipeline() {
            // Conditional Step Execution Block
            if (!isPaused) {
                enginePhysicsStep();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawHighContrastPitch();

            let refPos = projectCoordinate(referee.x, referee.y);
            ctx.fillStyle = colorRef.value;
            ctx.beginPath(); ctx.arc(refPos.x, refPos.y, 6.5, 0, Math.PI * 2); ctx.fill();

            players.forEach(p => {
                let pos = projectCoordinate(p.x, p.y);
                ctx.fillStyle = (p.team === 'A') ? colorTeamA.value : colorTeamB.value;
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2); ctx.fill();
            });

            let ballPos = projectCoordinate(ball.x, ball.y);
            ctx.fillStyle = colorBall.value;
            ctx.beginPath(); ctx.arc(ballPos.x, ballPos.y, 4, 0, Math.PI * 2); ctx.fill();

            requestAnimationFrame(renderExecutionPipeline);
        }

        // Operational Hooks
        pauseBtn.addEventListener('click', toggleEnginePauseState);
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault(); // Inhibit frame jump
                toggleEnginePauseState();
            }
        });

        cameraPreset.addEventListener('change', (e) => {
            if (e.target.value === 'coop') pitchAngleSlider.value = 52;
            else if (e.target.value === 'tele') pitchAngleSlider.value = 34;
            else if (e.target.value === 'tactical') pitchAngleSlider.value = 90;
        });

        formationASelect.addEventListener('change', buildMatchSquads);
        formationBSelect.addEventListener('change', buildMatchSquads);
        window.addEventListener('dblclick', () => {
            document.body.classList.toggle('sidebar-hidden');
            setTimeout(resizeCanvasViewport, 60);
        });
        window.addEventListener('resize', resizeCanvasViewport);

        resizeCanvasViewport();
        buildMatchSquads();
        updateScoreboardUI();
        renderExecutionPipeline();
    </script>
</body>
</html>
